server.port=8080
spring.application.name=ai-health-backend

# ? H2 FILE DB (ABSOLUTE PATH - VERY IMPORTANT)
spring.datasource.url=jdbc:h2:file:C:/Imps/Repos/AIHealthCompanion/ai-health-backend/data/aihealthdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ? JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ? CRITICAL FIX (order of execution)
spring.jpa.defer-datasource-initialization=true

# ? FORCE data.sql to run
spring.sql.init.mode=always

# ? H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console